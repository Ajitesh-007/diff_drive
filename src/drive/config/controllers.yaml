controller_manager:
  ros__parameters:
    update_rate: 50
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    use_sim_time: true
    left_wheel_names: ["joint_wheel_4", "joint_wheel_5", "joint_wheel_6"]
    right_wheel_names: ["joint_wheel_1", "joint_wheel_2", "joint_wheel_3"]
    wheel_separation: 0.512
    wheel_radius: 0.165

    use_stamped_vel: false
    open_loop: false

    # TF frames
    base_frame_id: base_link
    odom_frame_id: odom
    # Disabled — ekf_node already publishes odom->base_link tf
    enable_odom_tf: false

    publish_rate: 50.0
    cmd_vel_timeout: 0.5
    publish_cmd: true
