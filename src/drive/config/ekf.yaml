ekf_filter_node:
  ros__parameters:
    use_sim_time: true

    # Output frame config
    frequency: 50.0
    two_d_mode: true
    publish_tf: true
    print_diagnostics: true

    # Frame IDs
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # --- Wheel Odometry Input ---
    odom0: /odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 20

    # --- IMU Input (heading correction) ---
    imu0: /imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true
    imu0_queue_size: 20
    
